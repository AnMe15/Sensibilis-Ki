<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Sensibilis — Analytics Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
/* ── Tokens ─────────────────────────────────────────── */
:root {
  --c:#8C1A2A; --n:#0D1C3F; --g:#B8924A; --iv:#F3EDE3;
  --ink:#160A0D; --ink2:#5a4850; --bdr:#ddd4c8;
  --surf:#fff; --page:#F3EDE3;
  --n-lt:#1a2d5a; --c-lt:#a82034;
  --radius:10px;
  --shadow:0 2px 18px rgba(13,28,63,.10);
}
@media(prefers-color-scheme:dark){:root{
  --surf:#111827; --page:#0a0f1c; --iv:#1a2240;
  --ink:#e8dfd4; --ink2:#9ca3af; --bdr:#1e2d4a;
  --n:#1e3a6a; --n-lt:#2a4f8a;
}}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--page);color:var(--ink);min-height:100vh}

/* ── Login ──────────────────────────────────────────── */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-box{background:var(--surf);border-radius:16px;padding:48px 40px;max-width:380px;width:100%;box-shadow:var(--shadow);text-align:center}
.login-box .brand{font-family:Georgia,serif;font-size:22px;color:var(--n);margin-bottom:6px}
.login-box .brand em{font-style:italic;color:var(--c)}
.login-box p{font-size:13px;color:var(--ink2);margin-bottom:28px}
.login-box input{width:100%;border:1.5px solid var(--bdr);border-radius:8px;padding:12px 14px;font-size:15px;background:var(--page);color:var(--ink);outline:none;transition:border .2s}
.login-box input:focus{border-color:var(--g)}
.login-box button{margin-top:14px;width:100%;background:var(--n);color:#fff;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.04em;transition:background .2s}
.login-box button:hover{background:var(--n-lt)}
.login-err{color:var(--c);font-size:12px;margin-top:10px;min-height:18px}

/* ── App shell ──────────────────────────────────────── */
#app{display:none}
header{background:var(--n);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
header .logo{font-family:Georgia,serif;font-size:17px;color:#fff}.logo em{color:var(--g);font-style:italic}
header .meta{font-size:12px;color:rgba(255,255,255,.55);display:flex;gap:16px;align-items:center}
header .meta span{color:rgba(255,255,255,.75)}
header button.logout{background:none;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer}
header button.logout:hover{border-color:#fff;color:#fff}

main{max-width:1100px;margin:0 auto;padding:32px 24px}

/* ── Section title ──────────────────────────────────── */
.section-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2);margin:36px 0 14px}
.section-title:first-child{margin-top:0}

/* ── KPI row ────────────────────────────────────────── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:8px}
.kpi{background:var(--surf);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow);border-top:3px solid transparent}
.kpi.navy{border-top-color:var(--n)}
.kpi.gold{border-top-color:var(--g)}
.kpi.burg{border-top-color:var(--c)}
.kpi .label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);margin-bottom:8px}
.kpi .value{font-size:34px;font-weight:700;color:var(--ink);line-height:1;font-variant-numeric:tabular-nums}
.kpi .sub{font-size:12px;color:var(--ink2);margin-top:6px}

/* ── Chart cards ────────────────────────────────────── */
.chart-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
@media(max-width:700px){.chart-grid{grid-template-columns:1fr}}
.chart-grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
@media(max-width:700px){.chart-grid2{grid-template-columns:1fr}}
.card{background:var(--surf);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.card h3{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px}
.card .card-sub{font-size:11px;color:var(--ink2);margin-bottom:18px}
.chart-wrap{position:relative;width:100%;height:220px}
.chart-wrap canvas{width:100%!important;height:100%!important}

/* ── Empfehlungen ───────────────────────────────────── */
.recs{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.rec{background:var(--surf);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);border-left:4px solid var(--g);display:flex;flex-direction:column;gap:8px}
.rec .rec-type{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--g)}
.rec .rec-type.warn{color:var(--c)}
.rec .rec-type.ok{color:#2d7d46}
.rec h4{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3}
.rec p{font-size:13px;color:var(--ink2);line-height:1.6}
.rec-warn{border-left-color:var(--c)}
.rec-ok{border-left-color:#2d7d46}

/* ── E-Mail-Tabelle ─────────────────────────────────── */
.table-wrap{overflow-x:auto;border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--n);color:#fff;padding:10px 14px;text-align:left;font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
td{padding:10px 14px;border-bottom:1px solid var(--bdr);color:var(--ink)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(184,146,74,.07)}
.empty{text-align:center;color:var(--ink2);padding:32px;font-size:13px}

/* ── Footer ─────────────────────────────────────────── */
.dash-footer{text-align:center;padding:32px 0 16px;font-size:11px;color:var(--ink2)}

/* ── Loading / Error ────────────────────────────────── */
.loading{text-align:center;padding:80px;color:var(--ink2);font-size:14px}
.error-msg{background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:16px 20px;color:#991b1b;font-size:13px;margin-bottom:20px}
</style>
</head>
<body>

<!-- ── Login ─────────────────────────────────────── -->
<div id="login">
  <div class="login-box">
    <div class="brand"><em>S</em>ensibilis</div>
    <p>Analytics &amp; Insights — intern</p>
    <input type="password" id="pw" placeholder="Passwort" autocomplete="current-password">
    <button onclick="doLogin()">Anmelden</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ── App ───────────────────────────────────────── -->
<div id="app">
  <header>
    <div class="logo"><em>S</em>ensibilis &mdash; Dashboard</div>
    <div class="meta">
      <span id="last-update"></span>
      <button class="logout" onclick="doLogout()">Abmelden</button>
    </div>
  </header>

  <main>
    <div id="content"><div class="loading">Daten werden geladen&hellip;</div></div>
  </main>

  <div class="dash-footer">Sensibilis Analytics &mdash; nur zur internen Nutzung</div>
</div>

<script>
// ── Konfiguration ────────────────────────────────────────────────────────────
const API = 'https://sensibilis-api.onrender.com';
const USER = 'admin'; // HTTP-Basic username

// ── Farben (Brand) ───────────────────────────────────────────────────────────
const CLR = {
  navy:  '#0D1C3F', navyLt:'#1e3a6a', navyLt2:'rgba(13,28,63,.15)',
  gold:  '#B8924A', goldLt:'rgba(184,146,74,.18)',
  burg:  '#8C1A2A', burgLt:'rgba(140,26,42,.12)',
  grid:  'rgba(0,0,0,.06)', gridDk:'rgba(255,255,255,.07)',
};
const dark = () => window.matchMedia('(prefers-color-scheme:dark)').matches;
const gridColor = () => dark() ? CLR.gridDk : CLR.grid;

// ── Auth-State ───────────────────────────────────────────────────────────────
let _pw = '';

function doLogin(){
  const pw = document.getElementById('pw').value.trim();
  if(!pw){ showLoginErr('Bitte Passwort eingeben.'); return; }
  _pw = pw;
  document.getElementById('login-err').textContent = 'Wird geprüft…';
  loadDashboard();
}
document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
function doLogout(){ _pw=''; document.getElementById('app').style.display='none'; document.getElementById('login').style.display='flex'; document.getElementById('pw').value=''; }
function showLoginErr(msg){ document.getElementById('login-err').textContent=msg; }

// ── Daten laden ──────────────────────────────────────────────────────────────
async function loadDashboard(){
  try {
    const res = await fetch(`${API}/dashboard/data`, {
      headers:{ 'Authorization': 'Basic ' + btoa(USER+':'+_pw) }
    });
    if(res.status===401){ showLoginErr('Falsches Passwort.'); _pw=''; return; }
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('last-update').textContent = 'Stand: ' + new Date().toLocaleString('de-DE',{dateStyle:'short',timeStyle:'short'});
    render(data);
  } catch(e){
    showLoginErr('Verbindungsfehler: ' + e.message);
    _pw='';
  }
}

// ── Render ───────────────────────────────────────────────────────────────────
function render(d){
  const el = document.getElementById('content');

  // ── KPI ─────────────────────────────────────────────────────────────────
  const trend = d.sessions_30d > 0
    ? Math.round((d.sessions_7d / d.sessions_30d) * 30 / 7 * 100 - 100)
    : 0;
  const trendTxt = trend >= 0 ? `+${trend}% ggü. 30T-Schnitt` : `${trend}% ggü. 30T-Schnitt`;

  // ── Top-Seite 7T ────────────────────────────────────────────────────────
  const topPage = d.top_pages_7d?.[0];
  const topClick = d.top_clicks_30d?.[0];

  // ── Empfehlungen (regelbasiert) ─────────────────────────────────────────
  const recs = buildRecs(d, trend, topPage, topClick);

  // ── Charts vorbereiten ──────────────────────────────────────────────────
  const dailyLabels = d.daily_30d.map(r => {
    const dt = new Date(r[0]);
    return dt.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
  });
  const dailyValues = d.daily_30d.map(r => r[1]);

  const topPageLabels = (d.top_pages_7d||[]).slice(0,7).map(r => pageName(r[0]));
  const topPageValues = (d.top_pages_7d||[]).slice(0,7).map(r => r[1]);
  const topClickLabels = (d.top_clicks_30d||[]).slice(0,7).map(r => r[0]);
  const topClickValues = (d.top_clicks_30d||[]).slice(0,7).map(r => r[1]);

  el.innerHTML = `
    <div class="section-title">Überblick</div>
    <div class="kpi-row">
      <div class="kpi navy">
        <div class="label">Besuche letzte 7 Tage</div>
        <div class="value">${d.sessions_7d}</div>
        <div class="sub">${trendTxt}</div>
      </div>
      <div class="kpi navy">
        <div class="label">Besuche letzte 30 Tage</div>
        <div class="value">${d.sessions_30d}</div>
        <div class="sub">Gesamtreichweite</div>
      </div>
      <div class="kpi gold">
        <div class="label">E-Mails gesammelt</div>
        <div class="value">${d.email_count}</div>
        <div class="sub">Leads in der Datenbank</div>
      </div>
      <div class="kpi burg">
        <div class="label">Stärkste Seite (7T)</div>
        <div class="value" style="font-size:20px;line-height:1.4">${topPage ? pageName(topPage[0]) : '—'}</div>
        <div class="sub">${topPage ? topPage[1]+' Aufrufe' : 'keine Daten'}</div>
      </div>
    </div>

    <div class="section-title">Besuchsverlauf — letzte 30 Tage</div>
    <div class="card">
      <h3>Tägliche Seitenaufrufe</h3>
      <div class="card-sub">Gesamtvolumen pro Tag</div>
      <div class="chart-wrap"><canvas id="chart-daily"></canvas></div>
    </div>

    <div class="chart-grid2">
      <div class="card">
        <h3>Top-Seiten (7 Tage)</h3>
        <div class="card-sub">Meistbesuchte Bereiche</div>
        <div class="chart-wrap"><canvas id="chart-pages"></canvas></div>
      </div>
      <div class="card">
        <h3>Top-Klicks (30 Tage)</h3>
        <div class="card-sub">Welche Buttons werden gedrückt</div>
        <div class="chart-wrap"><canvas id="chart-clicks"></canvas></div>
      </div>
    </div>

    <div class="section-title">Handlungsempfehlungen</div>
    <div class="recs">${recs.map(recCard).join('')}</div>

    ${d.email_count > 0 ? `
    <div class="section-title">Gesammelte E-Mails (${d.email_count})</div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>E-Mail</th><th>Quelle</th><th>Datum</th></tr></thead>
          <tbody>${d.emails.map(emailRow).join('')}</tbody>
        </table>
      </div>
    </div>` : ''}
  `;

  // ── Chart: Daily ────────────────────────────────────────────────────────
  const gc = gridColor();
  new Chart(document.getElementById('chart-daily').getContext('2d'),{
    type:'line',
    data:{
      labels: dailyLabels,
      datasets:[{
        label:'Aufrufe',
        data: dailyValues,
        borderColor: CLR.navy,
        borderWidth: 2,
        backgroundColor: 'rgba(13,28,63,.10)',
        fill: true,
        tension: 0.35,
        pointRadius: 3,
        pointHoverRadius: 6,
        pointBackgroundColor: CLR.gold,
        pointBorderColor: CLR.navy,
        pointBorderWidth: 1.5,
      }]
    },
    options: chartOpts(gc, false)
  });

  // ── Chart: Top-Pages ────────────────────────────────────────────────────
  new Chart(document.getElementById('chart-pages').getContext('2d'),{
    type:'bar',
    data:{
      labels: topPageLabels,
      datasets:[{
        label:'Aufrufe',
        data: topPageValues,
        backgroundColor: topPageValues.map((_,i) => i===0 ? CLR.navy : 'rgba(13,28,63,.35)'),
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: chartOpts(gc, true)
  });

  // ── Chart: Clicks ────────────────────────────────────────────────────────
  new Chart(document.getElementById('chart-clicks').getContext('2d'),{
    type:'bar',
    data:{
      labels: topClickLabels,
      datasets:[{
        label:'Klicks',
        data: topClickValues,
        backgroundColor: topClickValues.map((_,i) => i===0 ? CLR.gold : 'rgba(184,146,74,.4)'),
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: chartOpts(gc, true)
  });
}

// ── Chart-Optionen ───────────────────────────────────────────────────────────
function chartOpts(gc, indexAxis){
  const base = {
    responsive: true,
    maintainAspectRatio: false,
    plugins:{
      legend:{display:false},
      tooltip:{
        backgroundColor:'rgba(13,28,63,.92)',
        titleColor:'#fff',
        bodyColor:'rgba(255,255,255,.75)',
        padding:10,
        cornerRadius:6,
      }
    },
    scales:{
      x:{grid:{color:gc},ticks:{color:'#888',font:{size:11}},border:{display:false}},
      y:{grid:{color:gc},ticks:{color:'#888',font:{size:11}},border:{display:false}}
    }
  };
  if(indexAxis) base.indexAxis = 'y';
  return base;
}

// ── Empfehlungen (regelbasiert) ──────────────────────────────────────────────
function buildRecs(d, trend, topPage, topClick){
  const recs = [];
  const pv7 = d.sessions_7d;
  const pv30 = d.sessions_30d;
  const emails = d.email_count;
  const pages = d.top_pages_7d || [];
  const clicks = d.top_clicks_30d || [];

  // Konversionsrate E-Mail
  const convRate = pv30 > 0 ? (emails / pv30 * 100).toFixed(1) : 0;
  if(emails === 0 && pv30 > 0){
    recs.push({type:'warn',title:'Kontaktformular noch nicht aktiv',text:`${pv30} Besuche, aber 0 E-Mail-Leads. Das Formular ist noch nicht mit dem Backend verbunden — Potenzial geht verloren.`});
  } else if(convRate < 2 && pv30 >= 20){
    recs.push({type:'warn',title:`Konversionsrate niedrig (${convRate}%)`,text:`Nur ${emails} von ${pv30} Besuchen führen zu einem Lead. CTA-Position und Formularsichtbarkeit prüfen.`});
  } else if(emails > 0){
    recs.push({type:'ok',title:`${emails} Leads gesammelt (${convRate}%)`,text:`Konversionsrate ist solide. Leads zeitnah kontaktieren — idealer Zeitraum: binnen 24 Stunden nach Eintrag.`});
  }

  // Trend
  if(trend > 20){
    recs.push({type:'ok',title:`Wachstumstrend +${trend}%`,text:'Die letzten 7 Tage liegen deutlich über dem 30-Tage-Schnitt. Aktuelle Inhalte oder Verlinkungen konsequent weiterverfolgen.'});
  } else if(trend < -20){
    recs.push({type:'warn',title:`Besuchsrückgang ${trend}%`,text:'Aktuelle Woche liegt unter dem Schnitt. Prüfen ob ein Go-Live-Datum oder Verlinkung fehlt. noindex ist noch aktiv.'});
  }

  // Stärkste Seite
  if(topPage){
    const pageN = pageName(topPage[0]);
    recs.push({type:'info',title:`"${pageN}" ist stärkster Einstieg`,text:`Diese Seite bekommt am meisten Aufmerksamkeit. CTA dort besonders stark und sichtbar halten.`});
  }

  // noindex-Hinweis
  recs.push({type:'warn',title:'noindex ist noch aktiv',text:'Die Website wird von Google nicht indexiert. Sobald die Seite go-live-bereit ist: noindex aus dem <head> entfernen und Canonical prüfen.'});

  // Klick-Champion
  if(topClick){
    recs.push({type:'ok',title:`Meistgeklickt: "${topClick[0]}"`,text:`${topClick[1]} Klicks in 30 Tagen. Dieser Button funktioniert — Formulierung als Vorlage für andere CTAs nutzen.`});
  }

  // Wenig Daten
  if(pv30 < 10){
    recs.push({type:'info',title:'Noch wenig Daten',text:'Unter 10 Besuchen — Aussagen sind noch nicht statistisch belastbar. Tracking läuft, nach weiteren 2–3 Wochen ergibt sich ein klares Bild.'});
  }

  return recs;
}

function recCard(r){
  const cls = r.type==='warn'?'rec rec-warn':r.type==='ok'?'rec rec-ok':'rec';
  const typLabel = r.type==='warn'?'Handlungsbedarf':r.type==='ok'?'Positiv':'Info';
  return `<div class="${cls}"><div class="rec-type ${r.type}">${typLabel}</div><h4>${r.title}</h4><p>${r.text}</p></div>`;
}

// ── Hilfsfunktionen ──────────────────────────────────────────────────────────
function pageName(id){
  const map={home:'Startseite',beratung:'Beratung',preise:'Preise',zukunft:'KI & Zukunft',faq:'FAQ',kontakt:'Kontakt',blog:'Blog',kipass:'KI Pass',contentplaner:'Content Planer',webcheck:'Web Check',dms:'DMS',tools:'Tools',prozesse:'Prozesse',impressum:'Impressum',datenschutz:'Datenschutz',agb:'AGB',glossar:'Glossar'};
  return map[id] || id;
}

function emailRow(r){
  const d = new Date(r.created_at).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'});
  return `<tr><td>${r.name||'—'}</td><td>${r.email}</td><td>${r.source||'—'}</td><td>${d}</td></tr>`;
}
</script>
</body>
</html>
